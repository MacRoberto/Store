<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Módulo de Ítems de Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex flex-col items-center py-10">
    
    <div class="w-full max-w-6xl bg-white shadow-md rounded-lg overflow-hidden">
        <div class="px-6 py-4 bg-indigo-600 border-b border-gray-200">
            <h2 class="text-xl font-bold text-white">Lista de Ítems de Inventario</h2>
        </div>
        
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID Ítem</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID Producto</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID Inventario</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Costo</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Cant. Recibida</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Cant. Disponible</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Precio Venta</th>
                    </tr>
                </thead>
                <tbody id="inventoryItemsTableBody" class="bg-white divide-y divide-gray-200">
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/inventory_items.js"></script>
</body>
</html>
