<!doctype html>
<html lang="es" class="h-full bg-gray-50">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Módulo de Categorías</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-full flex flex-col items-center py-10">
    <div class="w-full max-w-4xl bg-white shadow-md rounded-lg overflow-hidden">
      <div class="px-6 py-4 bg-indigo-600 border-b border-gray-200">
        <h2 class="text-xl font-bold text-white">Lista de Categorías</h2>
      </div>

      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th
              class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
            >
              ID
            </th>
            <th
              class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
            >
              Nombre
            </th>
            <th
              class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
            >
              Descripción
            </th>
          </tr>
        </thead>
        <tbody
          id="categoriesTableBody"
          class="bg-white divide-y divide-gray-200"
        ></tbody>
      </table>
    </div>

    <script src="../js/categories.js"></script>
  </body>
</html>
