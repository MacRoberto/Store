<!doctype html>
<html lang="es" class="h-full bg-gray-50">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Módulo de Categorías</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="h-full flex flex-col items-center py-10">
    <div class="w-full max-w-4xl bg-white shadow-md rounded-lg">

      <div class="px-6 py-4 bg-indigo-600 border-b border-gray-200 flex items-center justify-between rounded-t-xl">
        <h2 class="text-xl font-bold text-white">Lista de Categorías</h2>
        
        <button id="btnAgregar">
          <a href="add_category.html" class="text-white font-semibold hover:text-gray-200">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="#fff" class="size-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
          </a>
        </button>

      </div>

      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th
              class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
            >
              ID
            </th>
            <th
              class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
            >
              Nombre
            </th>
            <th
              class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
            >
              Descripción
            </th>
          </tr>
        </thead>
        <tbody
          id="categoriesTableBody"
          class="bg-white divide-y divide-gray-200"
        ></tbody>
      </table>
    </div>

    <script src="../js/categories.js"></script>
  </body>
</html>
