<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insertar Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex flex-col items-center py-10">
    <div class="w-full max-w-md bg-white shadow-md rounded-lg overflow-hidden">
      <div class="px-6 py-4 bg-indigo-600 border-b border-gray-200">
        <h2 class="text-xl font-bold text-white">Registrar Inventario</h2>
      </div>
           <form id="formNuevoInventario" class="p-6 space-y-4"><div>
        <div>
          <label for="UserId" class="block text-sm font-medium text-gray-700">ID de Usuario</label>
          <input type="number" id="UserId" name="UserId" required
            class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2" />
        </div>

        <div class="flex gap-3 pt-2">
          <label for="ArrivalDate" class="block text-sm font-medium text-gray-700">Fecha de Arribo</label>
          <input type="date" id="ArrivalDate" name="ArrivalDate" required
            class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2" />
        </div>
          
        <div class="flex gap-3 pt-2">
          <button id="btnGuardar" type="button"
            class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700">
            Guardar Inventario
          </button>
          <a href="inventories.html" class="px-4 py-2 text-gray-600 hover:underline">Cancelar</a>
        </div>
      </form>
    </div>
    <script src="../js/inventories.js"></script>
</body>
</html>
