<!doctype html>
<html lang="es" class="h-full bg-gray-100">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Punto de Venta</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-full">
    <div class="min-h-screen p-4">
      <div class="mx-auto grid max-w-7xl grid-cols-1 gap-4 lg:grid-cols-[1fr_360px]">
        <section class="rounded-2xl bg-white shadow-md overflow-hidden">
          <div class="bg-indigo-600 px-6 py-4">
            <h1 class="text-xl font-bold text-white">Punto de Venta</h1>
          </div>

          <div class="p-6">
            <div class="mb-4 flex gap-3">
              <input
                id="searchInput"
                type="text"
                placeholder="Código o nombre del producto"
                class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none focus:border-indigo-500"
              />
              <button
                id="btnSearch"
                type="button"
                class="rounded-lg bg-indigo-600 px-5 py-3 font-semibold text-white hover:bg-indigo-700"
              >
                Agregar
              </button>
            </div>

            <div class="overflow-x-auto">
              <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                  <tr>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500">ID</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500">Producto</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500">Precio</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500">Cant.</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500">Subtotal</th>
                    <th class="px-4 py-3 text-left text-xs font-semibold uppercase text-gray-500">Acción</th>
                  </tr>
                </thead>
                <tbody id="cartTableBody" class="divide-y divide-gray-100 bg-white"></tbody>
              </table>
            </div>
          </div>
        </section>

        <aside class="lg:sticky lg:top-4 h-fit rounded-2xl bg-white shadow-md overflow-hidden">
  <div class="bg-red-700 px-6 py-4">
    <h2 class="text-lg font-bold text-white">Cobro</h2>
  </div>

  <div class="p-5 space-y-4">
    <div class="rounded-xl bg-gray-50 p-4">
      <p class="text-sm font-medium text-gray-500">Total</p>
      <p id="totalLabel" class="mt-1 text-3xl font-extrabold text-gray-900">$0.00</p>
    </div>

    <div class="rounded-xl bg-gray-50 p-4">
      <label class="mb-2 block text-sm font-medium text-gray-700">Con cuánto paga</label>
      <input
        id="paidInput"
        type="text"
        inputmode="decimal"
        autocomplete="off"
        placeholder="0.00"
        class="w-full rounded-lg border border-gray-300 px-4 py-3 outline-none focus:border-indigo-500"
      />
    </div>

    <div class="rounded-xl bg-gray-50 p-4">
      <p class="text-sm font-medium text-gray-500">Cambio</p>
      <p id="changeLabel" class="mt-1 text-3xl font-extrabold text-green-600">$0.00</p>
    </div>

    <div class="grid grid-cols-2 gap-3 pt-2">
      <button class="rounded-xl bg-gray-200 px-4 py-3 font-semibold text-gray-700 hover:bg-gray-300" type="button">
        Eliminar
      </button> 
     <a
  href="view.html"
  class="flex items-center justify-center rounded-xl bg-yellow-400 px-4 py-3 font-semibold text-gray-900 hover:bg-yellow-500"
      >
      Más...
      </a>
      <button class="rounded-xl bg-yellow-400 px-4 py-3 font-semibold text-gray-900 hover:bg-yellow-500" type="button">
        Alimentos
      </button>
      <button class="rounded-xl bg-yellow-400 px-4 py-3 font-semibold text-gray-900 hover:bg-yellow-500" type="button">
        Servicios
      </button>
      <button class="rounded-xl bg-yellow-400 px-4 py-3 font-semibold text-gray-900 hover:bg-yellow-500" type="button">
        Financieros
      </button>
      <button class="rounded-xl bg-yellow-400 px-4 py-3 font-semibold text-gray-900 hover:bg-yellow-500" type="button">
        Tiempo Aire
      </button>
    </div>

    <button class="w-full rounded-xl bg-green-600 px-4 py-4 text-lg font-bold text-white hover:bg-green-700" type="button">
      COBRAR
    </button>
  </div>
</aside>
      </div>
    </div>

    <script src="../js/cashier.js"></script>
  </body>
</html>
