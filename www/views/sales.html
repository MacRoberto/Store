<!doctype html>
<html lang="en" class="h-full bg-gray-50">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sales Section</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div id="content">
      <div class="h-full flex flex-col items-center py-10">
        <div
          id="tableCard"
          class="w-full max-w-6xl bg-white shadow-md rounded-lg overflow-hidden"
        >
          <div
            class="px-6 py-4 bg-indigo-600 border-b border-gray-200 flex items-center justify-between rounded-t-xl"
          >
            <h2 class="text-xl font-bold text-white">Sales History</h2>

            <div class="flex items-center gap-4">
              <button
                id="btnRemove"
                class="block hidden"
                type="button"
                title="Delete"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="2.5"
                  stroke="currentColor"
                  class="w-6 h-6 text-white hover:text-gray-200 transition"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
                  />
                </svg>
              </button>

              <button
                id="btnEdit"
                class="block hidden"
                type="button"
                title="Edit"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="2.5"
                  stroke="currentColor"
                  class="w-6 h-6 text-white hover:text-gray-200 transition"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10"
                  />
                </svg>
              </button>

              <button id="btnAdd" class="block" type="button" title="Add">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke-width="2.5"
                  stroke="currentColor"
                  class="w-6 h-6 text-white hover:text-gray-200 transition"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
              <thead class="bg-gray-50">
                <tr>
                  <th
                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
                  >
                    Sale ID
                  </th>
                  <th
                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
                  >
                    Date
                  </th>
                  <th
                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
                  >
                    User
                  </th>
                  <th
                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
                  >
                    Payment Method
                  </th>
                  <th
                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
                  >
                    Total Amount
                  </th>
                  <th
                    class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
                  >
                    Status
                  </th>
                </tr>
              </thead>
              <tbody
                id="salesTableBody"
                class="bg-white divide-y divide-gray-200"
              ></tbody>
            </table>
          </div>
        </div>

        <div
          id="formCard"
          class="hidden w-full max-w-6xl bg-white shadow-md rounded-lg overflow-hidden mt-6"
        >
          <div
            class="px-6 py-4 bg-indigo-600 border-b border-gray-200 flex items-center justify-between rounded-t-xl"
          >
            <h2 id="formTitle" class="text-xl font-bold text-white">
              Add Sale
            </h2>
          </div>

          <form id="saleForm" class="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="hidden" id="id_sale" />

            <div class="md:col-span-2">
              <label
                for="user_id"
                class="block text-sm font-semibold text-gray-600 mb-1"
              >
                User
              </label>
              <select
                id="user_id"
                class="w-full rounded-md border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
              >
                <option value="">Loading users...</option>
              </select>
            </div>

            <div>
              <label
                for="total_amount"
                class="block text-sm font-semibold text-gray-600 mb-1"
              >
                Total Amount
              </label>
              <input
                id="total_amount"
                type="number"
                step="0.01"
                class="w-full rounded-md border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                placeholder="Total Amount"
              />
            </div>

            <div>
              <label
                for="payment_method"
                class="block text-sm font-semibold text-gray-600 mb-1"
              >
                Payment Method
              </label>
              <select
                id="payment_method"
                class="w-full rounded-md border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
              >
                <option value="">Select Payment Method</option>
                <option value="Cash">Cash</option>
                <option value="Card">Card</option>
                <option value="Transfer">Transfer</option>
              </select>
            </div>

            <div class="md:col-span-2">
              <label
                for="status"
                class="block text-sm font-semibold text-gray-600 mb-1"
              >
                Status
              </label>
              <select
                id="status"
                class="w-full rounded-md border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
              >
                <option value="">Select Status</option>
                <option value="Completed">Completed</option>
                <option value="Refunded">Refunded</option>
                <option value="Voided">Voided</option>
              </select>
            </div>

            <div class="md:col-span-2 flex justify-end gap-3 mt-2">
              <button
                type="button"
                id="btnCancelForm"
                class="px-5 py-3 rounded-md bg-gray-500 text-white hover:bg-gray-600 transition"
              >
                Cancel
              </button>

              <button
                type="submit"
                class="px-5 py-3 rounded-md bg-indigo-600 text-white hover:bg-indigo-700 transition"
              >
                Save
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="../js/sales.js"></script>
  </body>
</html>
