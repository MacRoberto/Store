<!doctype html>
<html lang="es" class="h-full bg-gray-50">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add & edit product</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-full flex flex-col items-center py-10 px-4 gap-6">
    <div class="w-full max-w-6xl bg-white shadow-md rounded-lg overflow-hidden">
      <div
        class="px-6 py-4 bg-indigo-600 border-b border-gray-200 rounded-t-xl"
      >
        <h2 class="text-xl font-bold text-white">Product Information</h2>
      </div>

      <form
        id="itemForm"
        method="POST"
        action="products"
        class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"
      >
        <div>
          <label
            class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1"
            >Barcode</label
          >
          <input
            type="text"
            name="barcode"
            placeholder="e.g. 0012334354546"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
          />
        </div>

        <div>
          <label
            class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1"
            >Product Name</label
          >
          <input
            type="text"
            name="name"
            placeholder="e.g. Monster Energy"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm font-medium"
          />
        </div>

        <div>
          <label
            class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1"
            >Category</label
          >
          <select
            name="category"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm bg-white"
          >
            <option value="">Select Category</option>
            <option value="Energizantes">Energizantes</option>
            <option value="Household Essentials">Household Essentials</option>
            <option value="Office & School Supplies">
              Office & School Supplies
            </option>
            <option value="Grocery & Food">Grocery & Food</option>
          </select>
        </div>

        <div>
          <label
            class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1"
            >Status</label
          >
          <select
            name="status"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm bg-white"
          >
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>

        <div class="md:col-span-2">
          <label
            class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1"
            >Description</label
          >
          <input
            type="text"
            name="description"
            placeholder="e.g. Refrescante"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
          />
        </div>

        <div>
          <label
            class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1"
            >Minimum Stock</label
          >
          <input
            type="number"
            name="reorder_level"
            min="0"
            placeholder="0"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
          />
        </div>

        <div>
          <label
            class="block text-xs font-semibold text-gray-600 uppercase tracking-wider mb-1"
            >Product Units</label
          >
          <input
            type="number"
            name="units"
            min="0"
            placeholder="0"
            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
          />
        </div>

        <div
          class="lg:col-span-4 flex justify-end gap-3 pt-2 border-t border-gray-100 mt-2"
        >
          <button
            type="reset"
            class="px-4 py-2 border border-gray-300 text-gray-700 font-medium text-sm rounded-md shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
          >
            Clear Form
          </button>
          <button
            type="submit"
            class="px-5 py-2 bg-indigo-600 text-white font-medium text-sm rounded-md shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
          >
            Save Product
          </button>
        </div>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../js/function.js"></script>
    <script src="../../js/products.js"></script>
  </body>
</html>
