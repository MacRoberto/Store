<!doctype html>
<html lang="es" class="h-full bg-gray-50">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agregar Artículo al Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="h-full flex items-center justify-center py-10 px-4">
    <div class="w-full max-w-lg bg-white shadow-md rounded-lg overflow-hidden border border-gray-200">
      <div class="px-6 py-4 bg-indigo-600 border-b border-gray-200">
        <h2 class="text-xl font-bold text-white text-center">
          Registrar Artículo en Inventario
        </h2>
      </div>

      <form id="formInsertarItem" class="p-6 space-y-4">
        <!-- Selección de Producto -->
        <div>
          <label for="productId" class="block text-sm font-medium text-gray-700 mb-1">Seleccionar Producto</label>
          <select id="productId" name="product_id" class="w-full border border-gray-300 rounded-md px-3 py-2 bg-white focus:ring-indigo-500 focus:border-indigo-500 text-sm" required>
            <option value="">Cargando productos...</option>
          </select>
        </div>

        <!-- Selección de Almacén / Inventario -->
        <div>
          <label for="idInventory" class="block text-sm font-medium text-gray-700 mb-1">Seleccionar Almacén / Inventario</label>
          <select id="idInventory" name="id_inventory" class="w-full border border-gray-300 rounded-md px-3 py-2 bg-white focus:ring-indigo-500 focus:border-indigo-500 text-sm" required>
            <option value="">Cargando almacenes...</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <!-- Precio Costo -->
          <div>
            <label for="costPrice" class="block text-sm font-medium text-gray-700 mb-1">Precio Costo</label>
            <input type="number" step="0.01" id="costPrice" name="cost_price" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm" required>
          </div>
          <!-- Precio Venta -->
          <div>
            <label for="salePrice" class="block text-sm font-medium text-gray-700 mb-1">Precio Venta</label>
            <input type="number" step="0.01" id="salePrice" name="sale_price" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm" required>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <!-- Cantidad Recibida -->
          <div>
            <label for="quantityReceived" class="block text-sm font-medium text-gray-700 mb-1">Cant. Recibida</label>
            <input type="number" id="quantityReceived" name="quantity_received" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm" required>
          </div>
          <!-- Cantidad Disponible -->
          <div>
            <label for="quantityAvailable" class="block text-sm font-medium text-gray-700 mb-1">Cant. Disponible</label>
            <input type="number" id="quantityAvailable" name="quantity_available" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm" required>
          </div>
        </div>

        <!-- Botones de Acción -->
        <div class="flex flex-col gap-2 pt-4">
          <button type="submit" id="btnGuardarItem" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-md shadow transition-colors text-sm">
            Guardar Artículo
          </button>
          <a href="inventory_items.html" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-4 rounded-md border border-gray-300 text-center text-sm transition-colors">
            Cancelar
          </a>
        </div>
      </form>
    </div>

    <script src="../js/inventory_items.js"></script>
  </body>
</html>
